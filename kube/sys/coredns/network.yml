---
apiVersion: v1
kind: Service
metadata:
  name: kube-dns
  namespace: kube-system
  annotations:
    prometheus.io/port: "9153"
    prometheus.io/scrape: "true"
  labels:
    k8s-app: kube-dns
    kubernetes.io/cluster-service: "true"
    app.kubernetes.io/name: coredns
spec:
  selector:
    k8s-app: kube-dns
  clusterIP: 10.43.0.10
  ports:
  - name: dns
    port: 53
    protocol: UDP
  - name: dns-tcp
    port: 53
    protocol: TCP
  - name: metrics
    port: 9153
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: coredns-udp
  namespace: kube-system
  annotations:
    metallb.io/allow-shared-ip: coredns
    metallb.io/loadBalancerIPs: "192.168.1.223"
  labels:
    app.kubernetes.io/name: coredns
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
  - name: dns
    port: 53
    protocol: UDP
  selector:
    k8s-app: kube-dns
---
apiVersion: v1
kind: Service
metadata:
  name: coredns-tcp
  namespace: kube-system
  annotations:
    metallb.io/allow-shared-ip: coredns
    metallb.io/loadBalancerIPs: "192.168.1.223"
  labels:
    app.kubernetes.io/name: coredns
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
  - name: dns
    port: 53
    protocol: TCP
  - name: metrics
    port: 9153
    protocol: TCP
  selector:
    k8s-app: kube-dns

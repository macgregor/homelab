apiVersion: batch/v1
kind: CronJob
metadata:
  name: radarr-missing-search
  namespace: media
  labels:
    app.kubernetes.io/name: radarr
spec:
  schedule: "0 1 * * *"
  timeZone: "America/New_York"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: radarr
    spec:
      ttlSecondsAfterFinished: 604800
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: radarr
        spec:
          restartPolicy: Never
          containers:
          - name: missing-search
            # https://hub.docker.com/r/badouralix/curl-jq/tags
            image: badouralix/curl-jq:alpine
            resources:
              requests:
                memory: "16Mi"
              limits:
                memory: "64Mi"
            env:
            - name: RADARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: radarr-api-key
                  key: RADARR_API_KEY
            command:
            - /bin/sh
            - -c
            - |
              MOVIE_IDS=$(curl -sf \
                -H "X-Api-Key: ${RADARR_API_KEY}" \
                http://radarr:7878/api/v3/movie | \
                jq -c '[.[] | select(.monitored and (.hasFile | not) and .status == "released") | .id]')

              COUNT=$(echo "$MOVIE_IDS" | jq 'length')
              if [ "$COUNT" -gt 0 ]; then
                echo "Searching for $COUNT released missing movies"
                curl -sf -X POST \
                  -H "X-Api-Key: ${RADARR_API_KEY}" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\": \"MoviesSearch\", \"movieIds\": $MOVIE_IDS}" \
                  http://radarr:7878/api/v3/command
              else
                echo "No released missing movies to search"
              fi

---
ansible_connection: ansible.netcommon.network_cli
ansible_network_os: community.routeros.routeros
ansible_become: no
router_user: macgregor

# MikroTik configuration
router_timezone: America/New_York
router_dns_servers: 1.1.1.1,1.0.0.1

# Network topology
router_ip: "192.168.1.1"
router_factory_ip: "192.168.88.1"
router_lan_subnet: "192.168.1.0/24"
router_dhcp_range: "192.168.1.50-192.168.1.199"

# Kubernetes service IPs (MetalLB allocations)
ingress_external_ip: "192.168.1.220"
victorialogs_syslog_ip: "192.168.1.228"
syncthing_relay_ip: "192.168.1.233"

# Service ports
ssh_port: 22
ingress_external_port: 443
victorialogs_syslog_port: 5140
syncthing_relay_port: 22067

# Static DHCP leases (MAC -> IP mapping)
# Read MAC addresses from .envrc env vars
router_static_leases:
  - { name: "wifi-ap",       mac: "{{ lookup('env', 'AP_MAC')            | mandatory('AP_MAC is not set — source .envrc') }}",            ip: "192.168.1.2" }
  - { name: "desktop",       mac: "{{ lookup('env', 'DESKTOP_MAC')       | mandatory('DESKTOP_MAC is not set — source .envrc') }}",       ip: "192.168.1.3" }
  - { name: "synology-eth1", mac: "{{ lookup('env', 'SYNOLOGY_ETH1_MAC') | mandatory('SYNOLOGY_ETH1_MAC is not set — source .envrc') }}", ip: "192.168.1.200" }
  - { name: "synology-eth2", mac: "{{ lookup('env', 'SYNOLOGY_ETH2_MAC') | mandatory('SYNOLOGY_ETH2_MAC is not set — source .envrc') }}", ip: "192.168.1.201" }
  - { name: "k3-m1",         mac: "{{ lookup('env', 'K3_M1_MAC')         | mandatory('K3_M1_MAC is not set — source .envrc') }}",         ip: "192.168.1.210" }
  - { name: "k3-n1",         mac: "{{ lookup('env', 'K3_N1_MAC')         | mandatory('K3_N1_MAC is not set — source .envrc') }}",         ip: "192.168.1.211" }

# PoE watchdog: power-cycle the port if the device stops responding to ping.
# Port assignments are physical — update if Pis move to different ports.
router_poe_watchdog:
  - { port: "ether2", address: "192.168.1.2",   name: "wifi-ap", timeout: "5m" }
  - { port: "ether5", address: "192.168.1.211", name: "k3-n1",   timeout: "5m" }
  - { port: "ether6", address: "192.168.1.210", name: "k3-m1",   timeout: "5m" }

# Cloudflare (read from .envrc env vars)
cf_zone_id: "{{ lookup('env', 'CF_ZONE_ID') | mandatory('CF_ZONE_ID is not set — source .envrc') }}"
cf_mikrotik_ddns_token: "{{ lookup('env', 'CF_MIKROTIK_DDNS_TOKEN') | mandatory('CF_MIKROTIK_DDNS_TOKEN is not set — source .envrc') }}"
cf_ddns_records:
  - name: web
    record_id: "{{ lookup('env', 'CF_DNS_RECORD_ID') | mandatory('CF_DNS_RECORD_ID is not set — source .envrc') }}"
    record_name: "{{ lookup('env', 'CF_DNS_RECORD_NAME') | mandatory('CF_DNS_RECORD_NAME is not set — source .envrc') }}"
    proxied: "true"
  - name: vpn
    record_id: "{{ lookup('env', 'CF_VPN_DNS_RECORD_ID') | mandatory('CF_VPN_DNS_RECORD_ID is not set — source .envrc') }}"
    record_name: "{{ lookup('env', 'CF_VPN_DNS_RECORD_NAME') | mandatory('CF_VPN_DNS_RECORD_NAME is not set — source .envrc') }}"
    proxied: "false"

# WireGuard interface
wg_address: "10.100.0.1/24"
wg_port: 51820

# WireGuard VPN peers
# Each device gets its own keypair and preshared key. To add a new peer:
#   1. Generate keys: wg genkey | tee ~/.wireguard/<name>-private.key | wg pubkey > ~/.wireguard/<name>-public.key && wg genpsk > ~/.wireguard/<name>-psk.key
#   2. Add to .envrc: export WG_<NAME>_PUBLIC_KEY="$(cat ~/.wireguard/<name>-public.key)" and WG_<NAME>_PSK="$(cat ~/.wireguard/<name>-psk.key)"
#   3. Add entry to wg_peers below with the next available address (e.g., 10.100.0.3/32)
#   4. Run: ansible-playbook mikrotik-configure.yml (new peer created, existing peers untouched)
#   5. Assemble client config using: <name> private key + <name> PSK + router public key (ssh router '/interface wireguard print') + endpoint
#   6. Store all values in KeePass
#   7. To revoke: remove wg_peers entry and .envrc vars, then: ssh router '/interface wireguard peers remove [find comment="<name>"]'
# Address assignments: .1 = router, .2 = phone, .3 = laptop, ...
wg_peers:
  - name: phone
    public_key: "{{ lookup('env', 'WG_PHONE_PUBLIC_KEY') | mandatory('WG_PHONE_PUBLIC_KEY is not set — source .envrc') }}"
    preshared_key: "{{ lookup('env', 'WG_PHONE_PSK') | mandatory('WG_PHONE_PSK is not set — source .envrc') }}"
    allowed_address: "10.100.0.2/32"
  - name: laptop
    public_key: "{{ lookup('env', 'WG_LAPTOP_PUBLIC_KEY') | mandatory('WG_LAPTOP_PUBLIC_KEY is not set — source .envrc') }}"
    preshared_key: "{{ lookup('env', 'WG_LAPTOP_PSK') | mandatory('WG_LAPTOP_PSK is not set — source .envrc') }}"
    allowed_address: "10.100.0.3/32"

# Port knocking (read from .envrc)
knock_port_1: "{{ lookup('env', 'KNOCK_PORT_1') | mandatory('KNOCK_PORT_1 is not set — source .envrc') }}"
knock_port_2: "{{ lookup('env', 'KNOCK_PORT_2') | mandatory('KNOCK_PORT_2 is not set — source .envrc') }}"
knock_port_3: "{{ lookup('env', 'KNOCK_PORT_3') | mandatory('KNOCK_PORT_3 is not set — source .envrc') }}"

# Split-horizon DNS: per-host entries managed by homelab-sync-dns.sh
# Exception: vpn.* is manually added (not an ingress, resolves to syncthing-relay LB for LAN)

  - { name: "seerr.matthew-stratton.me", address: "192.168.1.220" }
  - { name: "cook.matthew-stratton.me", address: "192.168.1.221" }
  - { name: "debug.matthew-stratton.me", address: "192.168.1.221" }
  - { name: "dnd.matthew-stratton.me", address: "192.168.1.221" }
  - { name: "grafana.matthew-stratton.me", address: "192.168.1.221" }
  - { name: "prowlarr.matthew-stratton.me", address: "192.168.1.221" }
  - { name: "qbittorrent.matthew-stratton.me", address: "192.168.1.221" }
  - { name: "radarr.matthew-stratton.me", address: "192.168.1.221" }
  - { name: "sonarr.matthew-stratton.me", address: "192.168.1.221" }
  - { name: "syncthing.matthew-stratton.me", address: "192.168.1.221" }
  - { name: "synology.matthew-stratton.me", address: "192.168.1.221" }

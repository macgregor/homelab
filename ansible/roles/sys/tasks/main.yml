---
# System User Management
# systemd-journal and adm groups give us access to logs without having to use sudo
- name: adding existing user '{{ ansible_user }}' to groups
  user:
    name: '{{ ansible_user }}'
    groups: [systemd-journal, adm, chrony, audio, video]
    append: yes

- name: Set authorized key taken from local file
  ansible.posix.authorized_key:
    user: "{{ ansible_user }}"
    state: present
    key: "{{ lookup('file', '{{ ssh_pub_key }}') }}"

# set hostname
- name: Set hostname to inventory name
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

# set locale/timezone
- name: Get current locale
  ansible.builtin.shell: "localectl status | head -n 1 | sed 's/System Locale: //' | tr -d '\n'"
  register: current_locale
  changed_when: false

- name: set locale
  command: localectl set-locale LANG=en_US.UTF-8
  when: current_locale.stdout != 'LANG=en_US.UTF-8'

- name: Set timezone to America/New_York
  community.general.timezone:
    name: America/New_York

# Packages
- name: Enable additional repositories
  tags: [ slow ]
  dnf:
    name:
      - "epel-release"
    update_cache: yes
    state: 'present'

- name: Import EPEL 9 GPG key
  ansible.builtin.rpm_key:
    key: https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-9
    state: present

- name: "Install system packages"
  tags: [ slow ]
  dnf:
    name:
      - "dnf-automatic"
      - "nfs-utils"
      - "iscsi-initiator-utils"
      - "yum-utils"
      - "iotop"
      - "sysstat"
      - "tar"
      - "unzip"
      - "bind-utils"
      - "dosfstools"
    update_cache: no
    state: 'present'

# Files
- name: ensures dirs exist
  file: 
    path: "{{ item}}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "u=rwx,g=rx,o="
  loop:
    - "/home/{{ ansible_user }}/.config"
    - "/home/{{ ansible_user }}/.config/neofetch"

- name: Disable GSSAPI authentication in sshd
  ansible.builtin.copy:
    src: 50-disable-gssapi.conf
    dest: /etc/ssh/sshd_config.d/50-disable-gssapi.conf
    owner: root
    group: root
    mode: '0600'
  notify: restart-sshd

- name: Deploy config files, scripts, etc
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode | default('0644') }}"
  loop:
    - { src: dnf-automatic.conf.j2, dest: /etc/dnf/automatic.conf }
    - { src: motd.txt, dest: /etc/motd.d/00-notes.txt }
    - { src: journald.conf.j2, dest: /etc/systemd/journald.conf }
    - { src: 60-sd-scheduler.rules, dest: /etc/udev/rules.d/60-sd-scheduler.rules }
    - { src: 61-iscsi-tuning.rules, dest: /etc/udev/rules.d/61-iscsi-tuning.rules }

# Raspberry Pi
- name: Get /boot partition source from fstab
  ansible.builtin.shell: "awk '$2 == \"/boot\" {print $1}' /etc/fstab"
  register: boot_src
  changed_when: false

- name: Enable fsck on boot for /boot partition
  ansible.posix.mount:
    path: /boot
    src: "{{ boot_src.stdout }}"
    fstype: vfat
    opts: defaults,noatime
    passno: "2"
    state: present

- name: Deploy Boot Config
  tags: [ sys-reboot ]
  ansible.builtin.template:
    src: rpi-boot-config.txt
    dest: /boot/config.txt
    mode: '0755'
  notify: reboot

# Node maintenance
- name: Deploy node maintenance script
  ansible.builtin.template:
    src: node-maintenance.sh
    dest: /usr/local/bin/node-maintenance.sh
    owner: root
    group: root
    mode: '0755'

- name: Stop and disable old dnf-automatic-reboot units
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - dnf-automatic-reboot.timer
    - dnf-automatic-reboot.service
  ignore_errors: true

- name: Remove old dnf-automatic-reboot unit files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/dnf-automatic-reboot.service
    - /etc/systemd/system/dnf-automatic-reboot.timer
    - /usr/local/bin/dnf-automatic-reboot.sh
  notify: reload-systemd

# Time synchronization: ensure dnf-automatic waits for accurate clock.
# RPi 4B has no battery-backed RTC, so the system clock is wrong at boot until
# chrony syncs via NTP. chrony-wait blocks time-sync.target until sync completes;
# the drop-in makes the dnf-automatic timer wait for it.
- name: Enable chrony-wait for time-sync.target
  ansible.builtin.service:
    name: chrony-wait.service
    enabled: true

- name: Create dnf-automatic-install.timer drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/dnf-automatic-install.timer.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Make dnf-automatic-install.timer wait for time sync
  ansible.builtin.copy:
    content: |
      [Unit]
      After=time-sync.target
      Wants=time-sync.target
    dest: /etc/systemd/system/dnf-automatic-install.timer.d/time-sync.conf
    owner: root
    group: root
    mode: '0644'
  notify: reload-systemd

# Systemd
- name: Deploy systemd unit files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode | default('0644') }}"
  notify: reload-systemd
  loop:
    - { src: node-maintenance.service, dest: /etc/systemd/system/node-maintenance.service }
    - { src: node-maintenance.timer, dest: /etc/systemd/system/node-maintenance.timer }

# Deploy iSCSI cleanup script to all nodes (before service management)
- name: Deploy iSCSI cleanup script
  tags: [ slow ]
  ansible.builtin.copy:
    src: iscsi-cleanup.sh
    dest: /usr/local/bin/iscsi-cleanup.sh
    owner: root
    group: root
    mode: '0755'

# Create systemd drop-in to run cleanup on stop (before service management)
- name: Create iscsid drop-in directory
  tags: [ slow ]
  ansible.builtin.file:
    path: /etc/systemd/system/iscsid.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create iscsid drop-in to cleanup on stop
  tags: [ slow ]
  ansible.builtin.copy:
    content: |
      [Service]
      ExecStopPost=/usr/local/bin/iscsi-cleanup.sh
    dest: /etc/systemd/system/iscsid.service.d/cleanup.conf
    owner: root
    group: root
    mode: '0644'
  notify: reload-systemd

- name: Manage systemd services
  tags: [ slow ]
  ansible.builtin.service:
    name: "{{ item.name }}"
    state: "{{ item.state | default('started') }}"
    enabled: "{{ item.enabled | default('true') }}"
    masked: "{{ item.masked | default('false') }}"
  loop:
    - {name: dnf-automatic-install.timer}
    - {name: node-maintenance.timer}
    - {name: systemd-journald.service}
    - {name: iscsid.service, state: "{{ 'stopped' if inventory_hostname in groups['master'] else 'started' }}", enabled: "{{ false if inventory_hostname in groups['master'] else true }}"}
    - {name: iscsid.socket, state: stopped, enabled: "{{ false if inventory_hostname in groups['master'] else true }}", masked: "{{ true if inventory_hostname in groups['master'] else false }}"}
    - {name: firewalld.service, state: stopped, enabled: false, masked: true}
    - {name: rsyslog.service, state: stopped, enabled: false, masked: true}
